name: datahub-actions
base: bare
build-base: ubuntu@24.04
# DataHub versioning can go 4 levels deep.
# We keep documentation to 3 levels, rest to 4 levels.
version: '1.4.0.5'
summary: "DataHub Actions 1.4.0 Rock"
description: "OCI image for the Actions component of DataHub."
platforms:
  amd64:

run-user: _daemon_

services:
  datahub-actions:
    override: merge
    command: "/start_datahub_actions.sh"
    environment:
      VIRTUAL_ENV: "/opt/datahub/venv"
      PATH: "/opt/datahub/venv/bin:/usr/bin:/bin"
      HOME: "/home/datahub"
      REQUESTS_CA_BUNDLE: "/etc/ssl/certs/ca-certificates.crt"
      SSL_CERT_FILE: "/etc/ssl/certs/ca-certificates.crt"
      DATAHUB_ACTIONS_SYSTEM_CONFIGS_PATH: "/etc/datahub/actions/system/conf"
      DATAHUB_BUNDLED_VENV_PATH: "/opt/datahub/venvs"

parts:
  # Part 1: Build Python 3.11 from source (build-time only).
  # Required by the uv/pip toolchain.  Nothing from this part is primed —
  # Python is installed system-wide in the build instance and never
  # written to CRAFT_PART_INSTALL.
  python-from-source:
    plugin: nil
    source: https://www.python.org/ftp/python/3.11.14/Python-3.11.14.tgz
    source-type: tar
    source-checksum: sha256/563d2a1b2a5ba5d5409b5ecd05a0e1bf9b028cf3e6a6f0c87a5dc8dc3f2d9182
    build-packages:
      - build-essential
      - libbz2-dev
      - libffi-dev
      - libgdbm-dev
      - libncurses5-dev
      - libnss3-dev
      - libreadline-dev
      - libsqlite3-dev
      - libssl-dev
      - zlib1g-dev
    override-build: |
      cd "${CRAFT_PART_SRC}"
      ./configure --enable-optimizations --prefix=/usr/local
      make -j "$(nproc)"
      make install
      update-alternatives --install /usr/local/bin/python python \
        /usr/local/bin/python3.11 1

  # Part 2: Clone DataHub v1.4.0, build the primary virtualenv with
  # datahub-actions + metadata-ingestion, create bundled ingestion venvs
  # for the selected plugins, and stage scripts + config.
  datahub-actions-build:
    plugin: nil
    after:
      - python-from-source
    source: https://github.com/acryldata/datahub.git
    source-tag: v1.4.0.5
    source-depth: 1
    source-type: git
    build-snaps:
      - astral-uv
    build-packages:
      - build-essential
      - gcc
      - g++
      - git
      - libldap2-dev
      - libsasl2-dev
      - libkrb5-dev
      - librdkafka-dev
      - unixodbc-dev
      - libffi-dev
      - libssl-dev
    build-environment:
      - PATH: "/usr/local/bin:${PATH}"
      - UV_BUILD_CONSTRAINT: "${CRAFT_PART_SRC}/metadata-ingestion/build-constraints.txt"
    override-build: |
      set -eu

      RELEASE_VERSION="1.4.0.5"

      # Patch version strings so installed packages report 1.4.0
      python3.11 python-build/version_updater.py \
        --directory ./metadata-ingestion/ \
        --version "${RELEASE_VERSION}" --expected-update-count 1
      python3.11 python-build/version_updater.py \
        --directory ./datahub-actions/ \
        --version "${RELEASE_VERSION}" --expected-update-count 1

      # ── Primary virtualenv ──────────────────────────────────────────
      uv venv --python python3.11 /opt/datahub/venv
      export VIRTUAL_ENV="/opt/datahub/venv"
      export PATH="${VIRTUAL_ENV}/bin:${PATH}"

      uv pip install './metadata-ingestion/[base,s3-slim,gcs-slim,abs-slim]'
      uv pip install \
        './datahub-actions/[kafka,executor,slack,teams,tag_propagation,term_propagation,doc_propagation,observability]'

      # ── Bundled ingestion venvs ─────────────────────────────────────
      BUNDLED_VENV_PATH="/opt/datahub/venvs"
      mkdir -p "${BUNDLED_VENV_PATH}"
      cp docker/snippets/ingestion/constraints.txt "${BUNDLED_VENV_PATH}/"

      for plugin in s3 postgres kafka trino hive dbt superset elasticsearch; do
        venv="${BUNDLED_VENV_PATH}/${plugin}-bundled"
        echo "==> Creating bundled venv: ${plugin}-bundled"
        uv venv --python python3.11 "${venv}"

        # Use the -slim variant for s3 (avoids pulling in PySpark)
        extra="${plugin}"
        [ "${plugin}" = "s3" ] && extra="s3-slim"

        bash -c "source ${venv}/bin/activate && \
          uv pip install \
            './metadata-ingestion/[datahub-rest,datahub-kafka,file,${extra}]' \
            --constraints ${BUNDLED_VENV_PATH}/constraints.txt"
        echo "==> Done: ${plugin}-bundled"
      done

      # ── Collect artefacts ───────────────────────────────────────────
      mkdir -p "${CRAFT_PART_INSTALL}/opt/datahub"
      cp -a /opt/datahub/venv  "${CRAFT_PART_INSTALL}/opt/datahub/venv"
      cp -a /opt/datahub/venvs "${CRAFT_PART_INSTALL}/opt/datahub/venvs"

      # Startup script
      install -m 755 docker/datahub-actions/start.sh \
        "${CRAFT_PART_INSTALL}/start_datahub_actions.sh"

      # Default action configs (executor.yaml, etc.)
      mkdir -p "${CRAFT_PART_INSTALL}/etc/datahub/actions/system/conf"
      cp docker/datahub-actions/config/* \
        "${CRAFT_PART_INSTALL}/etc/datahub/actions/system/conf/"

      # Directories expected by start.sh at runtime (world-writable for
      # compatibility with the _daemon_ run-user)
      mkdir -p "${CRAFT_PART_INSTALL}/tmp/datahub/logs/actions/system"
      chmod -R 777 "${CRAFT_PART_INSTALL}/tmp/datahub"
      mkdir -p "${CRAFT_PART_INSTALL}/home/datahub"
      chmod 777 "${CRAFT_PART_INSTALL}/home/datahub"
      mkdir -p "${CRAFT_PART_INSTALL}/etc/datahub/actions/conf"

      # Copy uv binary from the build snap for runtime use
      mkdir -p "${CRAFT_PART_INSTALL}/usr/bin"
      install -m 755 /snap/astral-uv/current/bin/uv \
        "${CRAFT_PART_INSTALL}/usr/bin/uv"
      install -m 755 /snap/astral-uv/current/bin/uvx \
        "${CRAFT_PART_INSTALL}/usr/bin/uvx"

  # Part 3: Runtime dependencies for the bare-base image.
  # Provides the C library and shared libraries required by native Python
  # extension modules at runtime.  Python 3.11 itself is delivered by the
  # primary venv (built from source in part 1 and bundled in part 2).
  runtime-packages:
    plugin: nil
    stage-packages:
      - base-files
      - bash
      - coreutils
      - ca-certificates
      - curl
      - libc6
      - libsasl2-2
      - libsasl2-modules
      - libsasl2-modules-gssapi-mit
      - libkrb5-3
      - libgssapi-krb5-2
      - unixodbc
      - libexpat1
      - libsqlite3-0
    prime:
      - -usr/share/doc
      - -usr/share/man
      - -usr/share/lintian
      - -usr/share/bug
      - -usr/share/info
