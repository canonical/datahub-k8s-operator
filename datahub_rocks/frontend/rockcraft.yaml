name: datahub-frontend
base: bare
build-base: ubuntu@24.04
version: '1.4.0'
summary: "DataHub Actions 1.4.0 Rock"
description: "OCI image for the Frontend component of DataHub."
platforms:
  amd64:

run-user: _daemon_

services:
  datahub-frontend:
    override: merge
    command: "/start.sh"
    on-check-failure:
      up: ignore
    environment:
      JMX_VERSION: "0.20.0"
      LD_LIBRARY_PATH: "/lib:/lib64"
      OTEL_EXPORTER_OTLP_MAX_PAYLOAD_SIZE: "4194304"
      OTEL_EXPORTER_OTLP_HTTP_HTTP2_MAX_FRAME_SIZE: "16777215"
      OTEL_EXPORTER_OTLP_HTTP_COMPRESSION: "gzip"
      OTEL_EXPORTER_OTLP_TRACES_COMPRESSION: "gzip"
      SERVER_PORT: "9002"
      MFE_CONFIG_FILE_PATH: "/datahub-frontend/conf/mfe.config.dev.yaml"

checks:
  up:
    override: merge
    threshold: 4
    http:
      url: "http://localhost:9002/admin"

parts:
  # Part 1: Build Python 3.11 from source (build-time only).
  # Required by the Gradle/node-gyp toolchain. Nothing from this part
  # is primed — Python is installed system-wide in the build instance
  # and never written to CRAFT_PART_INSTALL.
  python-from-source:
    plugin: nil
    source: https://www.python.org/ftp/python/3.11.14/Python-3.11.14.tgz
    source-type: tar
    source-checksum: sha256/563d2a1b2a5ba5d5409b5ecd05a0e1bf9b028cf3e6a6f0c87a5dc8dc3f2d9182
    build-packages:
      - build-essential
      - libbz2-dev
      - libffi-dev
      - libgdbm-dev
      - libncurses5-dev
      - libnss3-dev
      - libreadline-dev
      - libsqlite3-dev
      - libssl-dev
      - zlib1g-dev
    override-build: |
      cd "${CRAFT_PART_SRC}"
      ./configure --enable-optimizations --prefix=/usr/local
      make -j "$(nproc)"
      make install
      update-alternatives --install /usr/local/bin/python python \
        /usr/local/bin/python3.11 1

  # Part 2: Clone DataHub at v1.4.0 and build the frontend distribution.
  # Only the four artifact groups required at runtime are copied into
  # CRAFT_PART_INSTALL; the Gradle cache, source tree, and JDK are
  # excluded from the final image automatically.
  datahub-frontend-build:
    plugin: nil
    after:
      - python-from-source
    source: https://github.com/acryldata/datahub.git
    source-tag: v1.4.0
    source-depth: 1
    source-type: git
    build-packages:
      - openjdk-17-jdk-headless
      - git
    build-environment:
      - PATH: "/usr/local/bin:${PATH}"
    override-build: |
      ./gradlew :datahub-frontend:dist -x yarnTest -x yarnLint

      # Built application (contents of build/stage/main → /datahub-frontend/)
      mkdir -p "${CRAFT_PART_INSTALL}/datahub-frontend/conf"
      cp -r datahub-frontend/build/stage/main/* \
        "${CRAFT_PART_INSTALL}/datahub-frontend/"

      # MFE config files (source tree → /datahub-frontend/conf/)
      cp datahub-frontend/conf/mfe.*.yaml \
        "${CRAFT_PART_INSTALL}/datahub-frontend/conf/"

      # Prometheus client config
      cp docker/monitoring/client-prometheus-config.yaml \
        "${CRAFT_PART_INSTALL}/datahub-frontend/"

      # Startup script
      cp docker/datahub-frontend/start.sh \
        "${CRAFT_PART_INSTALL}/start.sh"
      chmod 755 "${CRAFT_PART_INSTALL}/start.sh"

  # Part 3a: OpenTelemetry Java agent, placed at / per upstream Dockerfile.
  opentelemetry-agent:
    plugin: dump
    source: https://github.com/open-telemetry/opentelemetry-java-instrumentation/releases/download/v2.15.0/opentelemetry-javaagent.jar
    source-type: file
    source-checksum: sha256/7ecffb5fdda5d2e0fd0125abaffa218146a23dc2402d5c7b30cf5a2f2c3ff241
    organize:
      opentelemetry-javaagent.jar: opentelemetry-javaagent.jar

  # Part 3b: JMX Prometheus exporter agent, placed at / per upstream Dockerfile.
  jmx-prometheus-agent:
    plugin: dump
    source: https://repo1.maven.org/maven2/io/prometheus/jmx/jmx_prometheus_javaagent/0.20.0/jmx_prometheus_javaagent-0.20.0.jar
    source-type: file
    source-checksum: sha256/8b67ed40485d475648c36d11d21464b484406f85faf912b3363f71a6a7861320
    organize:
      jmx_prometheus_javaagent-0.20.0.jar: jmx_prometheus_javaagent.jar

  # Part 4: Runtime dependencies for the bare-base image.
  # apt resolves the full transitive closure; prime exclusions strip
  # documentation and JDK source to minimise final image size.
  runtime-packages:
    plugin: nil
    stage-packages:
      - base-files
      - bash
      - ca-certificates
      - curl
      - libc6
      - libsnappy1v5
      - libsqlite3-0
      - openjdk-17-jre-headless
    prime:
      - -usr/share/doc
      - -usr/share/man
      - -usr/share/lintian
      - -usr/share/bug
      - -usr/share/info
      - -usr/lib/jvm/java-17-openjdk-amd64/lib/src.zip
