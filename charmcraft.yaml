name: datahub-k8s
type: charm
title: DataHub
summary: DataHub operator
description: |
  DataHub is an extensible data catalog that enables data discovery, data observability
  and federated data governance.

  DataHub provides a service that can integrate with metadata sources such as PostgreSQL
  and Kafka after which metadata such as tables, topics, schema and lineage is gathered
  and served.

  It is useful for keeping track of schema, ownership and dependency information in data
  warehouses and pipelines.

assumes:
  - juju >= 3.4

bases:
  - build-on:
    - name: ubuntu
      channel: "22.04"
      architectures:
      - amd64
    run-on:
    - name: ubuntu
      channel: "22.04"
      architectures:
      - amd64

charm-libs:
  - lib: data_platform_libs.data_interfaces
    version: "0"
  - lib: data_platform_libs.data_models
    version: "0"
  - lib: traefik_k8s.ingress
    version: "2"
  - lib: trino_k8s.trino_catalog
    version: "0"
  - lib: hydra.oauth
    version: "0"
  - lib: prometheus_k8s.prometheus_scrape
    version: "0"
  - lib: grafana_k8s.grafana_dashboard
    version: "0"
  - lib: loki_k8s.loki_push_api
    version: "1"

parts:
  charm:
    plugin: uv
    source: .
    uv-groups:
      - charmlibs-pydeps
    build-snaps:
      - astral-uv
    build-packages:
      - pkg-config
      - libffi-dev
      - libssl-dev
      # Pin to prevent pulling incompatible `maturin` version
      - "rustc-1.85"
      - "cargo-1.85"
    prime:
      - -datahub_rocks/

peers:
  peer:
    interface: datahub

provides:
  metrics-endpoint:
    interface: prometheus_scrape
    optional: true

  grafana-dashboard:
    interface: grafana_dashboard
    optional: true

requires:
  db:
    interface: postgresql_client
    limit: 1

  kafka:
    interface: kafka_client
    limit: 1

  opensearch:
    interface: opensearch_client
    limit: 1

  frontend-ingress:
    interface: ingress
    limit: 1

  gms-ingress:
    interface: ingress
    limit: 1

  trino-catalog:
    interface: trino_catalog
    limit: 1

  oauth:
    interface: oauth
    limit: 1
    optional: true

  logging:
    interface: loki_push_api
    limit: 1
    optional: true

config:
  options:
    encryption-keys-secret-id:
      description: Juju secret ID for the Frontand and GMS encryption keys.
      type: string

    kafka-topic-prefix:
      description: Prefix for the names of Kafka topics created and used by DataHub.
      type: string

    opensearch-index-prefix:
      description: Prefix for the names of Opensearch indices created and used by DataHub.
      type: string

    use-play-cache-session-store:
      description: |
        Use Play framework's cache as session store instead of OIDC cookies.
        Use this option when response headers are too large for reverse proxy buffers.
        Note that this option turns the frontend service stateful and it is currently
        unsupported for horizontally scaled deployments.
      type: boolean
      default: false

    trino-patterns:
      description: |
        JSON object containing schema, table, and view filter patterns for
        Trino ingestion sources.  Each key ("schema-pattern", "table-pattern",
        "view-pattern") maps to an object with "allow" and "deny" lists of
        regex patterns.
      type: string
      default: '{"schema-pattern":{"allow":[".*"],"deny":[]},"table-pattern":{"allow":[".*"],"deny":[]},"view-pattern":{"allow":[".*"],"deny":[]}}'

actions:
  get-password:
    description: Return the auto-generated initial admin password.
  reindex:
    description: Rebuild search and graph indices from metadata store.
    params:
      clean:
        type: boolean
        description: |
          This process fetches the latest version of each aspect from the database
          and rebuilds the search and graph indices. If --clean is set, the existing
          indices will be deleted before reindexing.
    additionalProperties: false

containers:
  datahub-actions:
    resource: datahub-actions
  datahub-frontend:
    resource: datahub-frontend
  datahub-gms:
    resource: datahub-gms

resources:
  datahub-actions:
    type: oci-image
    description: OCI image for DataHub Actions
  datahub-frontend:
    type: oci-image
    description: OCI image for DataHub Frontend
  datahub-gms:
    type: oci-image
    description: OCI image for DataHub GMS
